<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 800px;
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #003087;
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 20px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-message {
            background: #003087;
            color: white;
            align-self: flex-end;
            border-radius: 12px 12px 0 12px;
        }

        .assistant-message {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-radius: 12px 12px 12px 0;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area input:focus {
            border-color: #003087;
        }

        .chat-input-area button {
            padding: 12px 24px;
            background: #003087;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input-area button:hover {
            background: #004db3;
        }

        .typing-indicator {
            color: #999;
            font-size: 13px;
            padding: 0 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Health AI Assistant</h1>
            <p>Ask me about patients, coverage, or claims</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant-message">
                Hello! I am the Health AI Assistant. 
                How can I help you today?
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="chat-input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask about patients, coverage, or claims..."
            />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(content, isUser) {
            const div = document.createElement('div');
            div.classList.add('message');
            div.classList.add(isUser ? 'user-message' : 'assistant-message');
            div.textContent = content;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            typingIndicator.textContent = 'Assistant is typing...';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            });

            const data = await response.json();
            typingIndicator.textContent = '';
            addMessage(data.response, false);
        }
    </script>
</body>
</html>
